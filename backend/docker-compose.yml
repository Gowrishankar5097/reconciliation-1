version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ledger-reconciliation-api
    ports:
      - "8000:8000"
    environment:
      # Database Configuration
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-Ledger_Reconsile}
      # OpenAI Configuration (optional - can be set via Admin Dashboard)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ledger-network

  mysql:
    image: mysql:8.0
    container_name: ledger-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-password}
      - MYSQL_DATABASE=${DB_NAME:-Ledger_Reconsile}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - ledger-network

networks:
  ledger-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
